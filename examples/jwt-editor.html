<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JWT Editor - Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0e1a;
      min-height: 100vh;
    }
    .controls {
      padding: 16px;
      background: #1e293b;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: #334155;
      color: #f1f5f9;
    }
    button:hover { background: #475569; }
    jwt-editor {
      display: block;
      height: calc(100vh - 60px);
    }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="toggleTheme()">Toggle Theme</button>
    <span id="themeLabel" style="color: #94a3b8; font-size: 14px;">Theme: dark</span>
  </div>

  <jwt-editor id="editor" theme="dark"></jwt-editor>

  <script src="../packages/jwt-editor/dist/jwt-editor.min.js"></script>
  <script>
    function toggleTheme() {
      const editor = document.getElementById('editor');
      const newTheme = editor.theme === 'dark' ? 'light' : 'dark';
      editor.theme = newTheme;
      document.getElementById('themeLabel').textContent = `Theme: ${newTheme}`;
      document.body.style.background = newTheme === 'dark' ? '#0a0e1a' : '#f8fafc';
    }
  </script>
</body>
</html>
